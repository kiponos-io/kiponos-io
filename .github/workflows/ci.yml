name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  golden-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Compile golden example
        working-directory: golden/java
        run: chmod +x gradlew && ./gradlew compileJava --no-daemon