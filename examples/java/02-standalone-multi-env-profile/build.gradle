plugins {
    id 'application'
    id 'java'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

group = 'io.kiponos.examples'
version = '1.0.0'

application {
    mainClass.set('io.kiponos.examples.multienv.MultiEnvProfileApp')
}

def kiponosId = System.getenv('KIPONOS_ID') ?: 'REPLACE_WITH_KIPONOS_ID_FROM_ACCOUNT'
def kiponosAccess = System.getenv('KIPONOS_ACCESS') ?: 'REPLACE_WITH_KIPONOS_ACCESS_FROM_ACCOUNT'
// Same jar, different env: set KIPONOS (or -Dkiponos) to the profile path for this process.
def kiponosProfile = System.getenv('KIPONOS') ?: "['my-app']['v1.0.0']['dev']['base']"

// Local/CI: export KIPONOS_ID, KIPONOS_ACCESS, and KIPONOS profile per environment.
// Public clone: replace REPLACE_WITH_* placeholders or set env vars.
tasks.withType(JavaExec).configureEach {
    environment 'KIPONOS_ID', kiponosId
    environment 'KIPONOS_ACCESS', kiponosAccess
    systemProperty 'kiponos', kiponosProfile
    systemProperty 'io.kiponos.host', 'kiponos.io'
}

tasks.withType(Test).configureEach {
    environment 'KIPONOS_ID', kiponosId
    environment 'KIPONOS_ACCESS', kiponosAccess
    systemProperty 'kiponos', kiponosProfile
    systemProperty 'io.kiponos.host', 'kiponos.io'
    if (kiponosId.startsWith('REPLACE_WITH_')) {
        systemProperty 'kiponos.golden.skip', 'true'
    }
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation 'io.kiponos:sdk-boot-3:4.4.0.250319'

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
    }
}
